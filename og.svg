<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="МедРедакция — AI-редактор медицинских статей с источниками">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1A2744"/>
      <stop offset="1" stop-color="#0F1A33"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect x="60" y="60" width="360" height="510" fill="#F5F3EF"/>
  <rect x="60" y="60" width="4" height="510" fill="#C8334E"/>
  <text x="240" y="330" text-anchor="middle" fill="#1A2744"
        font-family="Georgia, 'Times New Roman', serif" font-size="260" font-weight="700" letter-spacing="-0.02em">M</text>
  <text x="240" y="420" text-anchor="middle" fill="#C8334E"
        font-family="'Courier New', monospace" font-size="13" letter-spacing="0.28em">EDITORIAL · AI</text>
  <text x="460" y="160" fill="#F5F3EF"
        font-family="Georgia, 'Times New Roman', serif" font-size="76" font-weight="700" letter-spacing="-0.02em">МедРедакция</text>
  <text x="460" y="200" fill="#C8334E"
        font-family="'Courier New', monospace" font-size="15" letter-spacing="0.22em">МЕДИЦИНСКИЙ · КОПИРАЙТЕР · AI</text>
  <rect x="460" y="230" width="680" height="1" fill="rgba(255,255,255,0.15)"/>
  <text x="460" y="300" fill="#F5F3EF"
        font-family="Georgia, 'Times New Roman', serif" font-size="46" font-weight="700" letter-spacing="-0.01em">Три агента создают</text>
  <text x="460" y="355" fill="#F5F3EF"
        font-family="Georgia, 'Times New Roman', serif" font-size="46" font-weight="700" letter-spacing="-0.01em">медицинские статьи</text>
  <text x="460" y="410" fill="#F5F3EF"
        font-family="Georgia, 'Times New Roman', serif" font-size="46" font-weight="700" letter-spacing="-0.01em">с источниками.</text>
  <g font-family="'Inter', 'Segoe UI', sans-serif" font-size="18" fill="rgba(255,255,255,0.75)">
    <circle cx="470" cy="465" r="3" fill="#C8334E"/>
