    <circle cx="470" cy="500" r="3" fill="#C8334E"/>
    <text x="485" y="505">Источники: PubMed · ESMO · NCCN · Минздрав РФ</text>
    <circle cx="470" cy="535" r="3" fill="#C8334E"/>
    <text x="485" y="540">Экспорт в DOCX · HTML</text>
  </g>
  <rect x="460" y="575" width="680" height="1" fill="rgba(255,255,255,0.15)"/>
  <text x="460" y="605" fill="rgba(255,255,255,0.6)"
        font-family="'Courier New', monospace" font-size="14" letter-spacing="0.12em">WWW.MEDREDACTOR.RU</text>
  <text x="1140" y="605" text-anchor="end" fill="#C8334E"
        font-family="'Courier New', monospace" font-size="14" letter-spacing="0.12em">FREE · 1 СТАТЬЯ/МЕС</text>
</svg>
